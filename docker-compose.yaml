version: '3.8'

services:
  app:
    build: .
    container_name: iptvo-app
    restart: unless-stopped
    ports:
      - "1111:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://iptvo:${POSTGRES_PASSWORD}@postgres:5432/iptvo
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - iptvo-net

  postgres:
    image: postgres:16-alpine
    container_name: iptvo-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=iptvo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=iptvo
    volumes:
      - iptvo_postgres_data:/var/lib/postgresql/data
    networks:
      - iptvo-net

  redis:
    image: redis:7-alpine
    container_name: iptvo-redis
    restart: unless-stopped
    volumes:
      - iptvo_redis_data:/data
    networks:
      - iptvo-net

volumes:
  iptvo_postgres_data:
  iptvo_redis_data:

networks:
  iptvo-net:
    driver: bridge
