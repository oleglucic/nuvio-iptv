<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvio IPTV Setup Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #080c14;
            --bg-surface: #0f1626;
            --bg-element: #1a2333;
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-success: #10b981;
            --color-text-main: #f8fafc;
            --color-text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        body {
            background-color: var(--bg-base);
            color: var(--color-text-main);
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: linear-gradient(145deg, var(--bg-surface), #0b101b);
            border: 1px solid var(--border-color);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.15);
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            background-color: var(--bg-element);
            border: 1px solid var(--border-color);
            color: var(--color-text-main);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .row-flex {
            display: flex;
            gap: 15px;
        }

        .row-flex > div {
            flex: 1;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background-color: var(--bg-element);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .toggle-container label {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #374151;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--color-primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-hover);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #374151;
            color: white;
            margin-bottom: 20px;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }

        .btn-install {
            background-color: var(--color-success);
            color: white;
            margin-top: 10px;
            font-weight: 700;
        }

        .btn-install:hover {
            background-color: #059669;
        }

        #catalogContainer {
            display: none;
            background: #0b101b;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .scroll-box {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
        }

        .chk-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
            font-size: 14px;
        }

        .chk-row input {
            width: auto;
            margin-right: 12px;
            margin-bottom: 0;
        }

        .action-links {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .action-links button {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--bg-element);
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Nuvio IPTV Setup</h2>
        
        <label for="providerType">Provider Interface</label>
        <select id="providerType" onchange="toggleFormInputs()">
            <option value="xtream">Xtream Codes API</option>
            <option value="m3u">M3U Playlist URL</option>
        </select>

        <div id="xtreamFields">
            <label for="xtreamUrl">Server URL</label>
            <input type="text" id="xtreamUrl" placeholder="http://provider.com:8080">
            
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Username">
            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password">
        </div>

        <div id="m3uFields" style="display:none;">
            <label for="m3uUrl">M3U URL</label>
            <input type="text" id="m3uUrl" placeholder="https://provider.com/playlist.m3u">
        </div>

        <div class="row-flex">
            <div>
                <label for="fallbackPreference">Fallback Mode</label>
                <select id="fallbackPreference">
                    <option value="custom">Clean Posters</option>
                    <option value="provider">Raw Image</option>
                </select>
            </div>
            <div>
                <label for="timezoneOffset">Timezone Shift</label>
                <select id="timezoneOffset">
                    <option value="-12">UTC -12</option>
                    <option value="-11">UTC -11</option>
                    <option value="-10">UTC -10</option>
                    <option value="-9">UTC -9</option>
                    <option value="-8">UTC -8</option>
                    <option value="-7">UTC -7</option>
                    <option value="-6">UTC -6</option>
                    <option value="-5">UTC -5</option>
                    <option value="-4">UTC -4</option>
                    <option value="-3">UTC -3</option>
                    <option value="-2">UTC -2</option>
                    <option value="-1">UTC -1</option>
                    <option value="0">UTC +0</option>
                    <option value="1">UTC +1</option>
                    <option value="2">UTC +2</option>
                    <option value="3">UTC +3</option>
                    <option value="4">UTC +4</option>
                    <option value="5">UTC +5</option>
                    <option value="6">UTC +6</option>
                    <option value="7">UTC +7</option>
                    <option value="8">UTC +8</option>
                    <option value="9">UTC +9</option>
                    <option value="10">UTC +10</option>
                    <option value="11">UTC +11</option>
                    <option value="12">UTC +12</option>
                </select>
            </div>
        </div>

        <label for="customEpgUrl">Custom EPG XMLTV Source</label>
        <input type="text" id="customEpgUrl" placeholder="Optional URL">


        <button type="button" id="loadCatalogsBtn" class="btn-secondary" onclick="fetchCatalogs()">Load Channels</button>

        <div id="catalogContainer">
            <label>Active Layout Catalogs</label>
            <div class="action-links">
                <button type="button" onclick="toggleAllCheckboxes(true)">Select All</button>
                <button type="button" onclick="toggleAllCheckboxes(false)">Deselect All</button>
            </div>
            <div id="checklistList" class="scroll-box"></div>
        </div>

        <button type="button" id="installBtn" class="btn-primary btn-install" onclick="generateStremioLink()">Install Addon</button>
    </div>
</div>

<script>
    let totalCategoriesCount = 0;

    window.onload = function() {
        toggleFormInputs();
        const detectedOffset = -Math.round(new Date().getTimezoneOffset() / 60);
        const tzSelect = document.getElementById('timezoneOffset');
        if (tzSelect.querySelector('option[value="' + detectedOffset + '"]')) {
            tzSelect.value = detectedOffset.toString();
        }
    };

    function toggleFormInputs() {
        const type = document.getElementById('providerType').value;
        document.getElementById('xtreamFields').style.display = type === 'xtream' ? 'block' : 'none';
        document.getElementById('m3uFields').style.display = type === 'm3u' ? 'block' : 'none';
    }

    async function fetchCatalogs() {
        const btn = document.getElementById('loadCatalogsBtn');
        const container = document.getElementById('catalogContainer');
        const listDiv = document.getElementById('checklistList');
        
        const type = document.getElementById('providerType').value;
        const m3uUrl = document.getElementById('m3uUrl').value;
        const xtreamUrl = document.getElementById('xtreamUrl').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        btn.innerText = "Loading Groups...";
        btn.disabled = true;
        listDiv.innerHTML = "";

        try {
            const response = await fetch('/api/get-groups', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, m3uUrl, xtreamUrl, username, password })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            totalCategoriesCount = data.categories.length;
            
            data.categories.forEach(cat => {
                const label = document.createElement('label');
                label.className = "chk-row";
                label.innerHTML = `<input type="checkbox" class="catalog-chk" value="${encodeURIComponent(cat)}" checked> <span>${cat}</span>`;
                listDiv.appendChild(label);
            });

            container.style.display = "block";
            btn.innerText = "Reload Channels";
            btn.disabled = false;
            return true;
        } catch (err) {
            alert("Fetch failed: " + err.message);
            btn.innerText = "Load Channels";
            btn.disabled = false;
            return false;
        }
    }

    function toggleAllCheckboxes(status) {
        document.querySelectorAll('.catalog-chk').forEach(chk => chk.checked = status);
    }

    async function generateStremioLink() {
        let allCheckboxes = document.querySelectorAll('.catalog-chk');
        const installBtn = document.getElementById('installBtn');
        
        if (allCheckboxes.length === 0) {
            installBtn.innerText = "Auto-Syncing...";
            installBtn.disabled = true;
            const syncSuccess = await fetchCatalogs();
            installBtn.innerText = "Install Addon";
            installBtn.disabled = false;
            if (!syncSuccess) return;
            allCheckboxes = document.querySelectorAll('.catalog-chk');
        }

        const checked = [];
        const unchecked = [];

        allCheckboxes.forEach(chk => {
            const val = decodeURIComponent(chk.value);
            if (chk.checked) checked.push(val);
            else unchecked.push(val);
        });

        const type = document.getElementById('providerType').value;
        const fallbackPref = document.getElementById('fallbackPreference').value;
        const tzOffset = document.getElementById('timezoneOffset').value;
        const customEpg = document.getElementById('customEpgUrl').value.trim();
        
        const configObj = { 
            type, 
            fallbackPreference: fallbackPref,
            timezoneOffset: parseInt(tzOffset),
            ai: true
        };

        if (customEpg) {
            configObj.epg = customEpg;
        }

        if (type === 'xtream') {
            configObj.xtreamUrl = document.getElementById('xtreamUrl').value;
            configObj.username = document.getElementById('username').value;
            configObj.password = document.getElementById('password').value;
        } else {
            configObj.m3uUrl = document.getElementById('m3uUrl').value;
        }

        if (allCheckboxes.length > 0) {
            if (checked.length <= totalCategoriesCount / 2) {
                configObj.include = checked;
            } else {
                configObj.exclude = unchecked;
            }
        }

        let base64Config = btoa(unescape(encodeURIComponent(JSON.stringify(configObj))));
        base64Config = base64Config.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        
        const manifestUrl = `stremio://${window.location.host}/${base64Config}/manifest.json`;
        
        navigator.clipboard.writeText(manifestUrl).catch(() => {}).finally(() => {
            window.location.href = manifestUrl;
        });
    }
</script>
</body>
</html>
